# ci.yml: validate everything, build once, digest the artifact.
# Contract: docs/CI_CD.md section 4.1. Read-only permissions, zero secrets,
# safe for fork code. The aggregate gate job ci-status is the single required
# context. Third party actions pinned to immutable SHAs (SR009, AC044).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun (pinned via .bun-version)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install (lockfile, no mutation)
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Astro check
        run: bun run astro:check

      - name: Data validation (F1 anchors, F2 hero edges, DR008)
        run: bun run data:validate

      - name: Dependency audit, full tree (SR008)
        run: |
          set +e
          bun audit > audit.txt 2>&1
          status=$?
          set -e
          cat audit.txt
          if [ $status -ne 0 ] && grep -qE '(high|critical):' audit.txt; then
            echo 'blocking: high or critical advisory in the dependency tree (SR008).' >> "$GITHUB_STEP_SUMMARY"
            echo 'A dated exception in docs/DECISIONS.md is the only bypass.' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [ $status -ne 0 ]; then
            echo 'warning: low or moderate advisories present, not blocking.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Unit tests (incl AC031 determinism)
        run: bun run test:unit

      - name: Build
        run: bun run build
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build metadata (FR004, F27, AC050)
        run: bun run scripts/generate-build-info.ts
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Internal link check
        run: bun run check:links

      - name: Bundle budgets (PR004, PR005, AC036)
        run: bun run scripts/report-bundle.ts | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Playwright browsers
        run: bunx playwright install --with-deps chromium webkit

      - name: End to end tests (shell)
        run: bunx playwright test --project=e2e --project=e2e-webkit

      - name: Accessibility tests (AC025)
        run: bunx playwright test --project=a11y

      - name: Digest artifact (AC047)
        run: |
          cd dist && find . -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1 > ../dist.sha256
          echo "artifact digest: $(cat ../dist.sha256)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tested artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: site-dist-${{ github.sha }}
          path: |
            dist/
            dist.sha256
          retention-days: 30

  ci-status:
    name: ci-status
    runs-on: ubuntu-latest
    needs: [validate]
    if: always()
    steps:
      - name: Gate
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "validation failed"; exit 1
          fi
          echo "all blocking checks green"

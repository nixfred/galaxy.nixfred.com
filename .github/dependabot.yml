# Dependabot: grouped weekly updates per docs/DECISIONS.md Q77 and docs/CI_CD.md 3.8.
# Bun packages and GitHub Actions, one grouped PR each per week.
version: 2
updates:
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/New_York'
    groups:
      bun-dependencies:
        patterns:
          - '*'
    ignore:
      # typescript-eslint does not support TypeScript 6+ yet
      # (typescript-estree crashes on ts.ModuleKind.Cjs). Remove this ignore
      # when typescript-eslint ships support; CI blocks the bump meanwhile.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/New_York'
    groups:
      actions:
        patterns:
          - '*'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci'
